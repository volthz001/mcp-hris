<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Kasbon & Absensi</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14; --card: #141720; --border: #252a38;
      --text: #e8ecf4; --muted: #4a5568; --secondary: #7a8499;
      --accent: #f59e0b; --accent-dim: rgba(245,158,11,0.12);
      --red: #ef4444; --red-dim: rgba(239,68,68,0.12);
      --green: #10b981; --green-dim: rgba(16,185,129,0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
    }
    .login-title {
      font-size: 24px;
      font-weight: 700;
      margin-top: 8px;
      letter-spacing: -.5px;
    }
    .login-sub { font-size: 13px; color: var(--secondary); margin-top: 6px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      color: var(--secondary);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    /* Style dasar untuk semua input */
    .form-control {
      width: 100%;
      padding: 10px 13px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    .form-control:focus { border-color: var(--accent); }
    
    /* Khusus password container */
    .password-container {
      position: relative;
      width: 100%;
    }
    .password-container .form-control {
      padding-right: 40px; /* ruang untuk ikon */
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--secondary);
      transition: color 0.2s;
    }
    .toggle-password:hover { color: var(--accent); }
    .toggle-password svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
    }
    .btn-login {
      width: 100%; padding: 11px;
      background: var(--accent); color: #000;
      border: none; border-radius: 7px;
      font-weight: 700; cursor: pointer;
      margin-top: 4px;
    }
    .btn-login:hover { background: #fbbf24; }
    .alert {
      padding: 9px 13px; border-radius: 7px;
      font-size: 13px; margin-bottom: 14px;
    }
    .alert-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
    .register-link a, .forgot-link a {
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
    }
    .register-link a:hover, .forgot-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-header">
    <div class="login-tag">Sistem Manajemen</div>
    <h1 class="login-title">Kasbon & Absensi</h1>
    <p class="login-sub">Masuk untuk mengakses sistem</p>
  </div>
  <div class="card">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST" action="{{ url_for('login') }}" {{ csrf_token() }}>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" class="form-control" placeholder="Masukkan username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-container">
          <input type="password" name="password" id="login-password" class="form-control" placeholder="Masukkan password" required>
          <button type="button" class="toggle-password" id="togglePasswordBtn" aria-label="Tampilkan password">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login">Masuk →</button>
      <div class="register-link" style="text-align: center; margin-top: 16px;">
        Belum punya akun? <a href="{{ url_for('register') }}">Daftar sekarang</a>
      </div>  
    </form>
  </div>
</div>
<script>
  (function() {
    const btn = document.getElementById('togglePasswordBtn');
    const input = document.getElementById('login-password');
    if (btn && input) {
      let visible = false;
      function setIcon(show) {
        btn.innerHTML = show ? 
          `<svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
            <line x1="3" y1="3" x2="21" y2="21"/>
          </svg>` :
          `<svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>`;
      }
      setIcon(false);
      btn.addEventListener('click', () => {
        visible = !visible;
        input.type = visible ? 'text' : 'password';
        setIcon(visible);
        input.focus();
      });
    }
  })();
</script>
</body>
</html>
